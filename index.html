<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyondBrain - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-purple: #b700ff;
            --neon-yellow: #ffff00;
            --dark-bg: #0a0a1f;
        }

        @keyframes glitch {
            0% {
                text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-blue),
                            -0.025em 0.05em 0 var(--neon-yellow);
            }
            14% {
                text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-blue),
                            -0.025em 0.05em 0 var(--neon-yellow);
            }
            15% {
                text-shadow: -0.05em -0.025em 0 var(--neon-pink), 0.025em 0.025em 0 var(--neon-blue),
                            -0.05em -0.05em 0 var(--neon-yellow);
            }
            49% {
                text-shadow: -0.05em -0.025em 0 var(--neon-pink), 0.025em 0.025em 0 var(--neon-blue),
                            -0.05em -0.05em 0 var(--neon-yellow);
            }
            50% {
                text-shadow: 0.025em 0.05em 0 var(--neon-pink), 0.05em 0 0 var(--neon-blue),
                            0 -0.05em 0 var(--neon-yellow);
            }
            99% {
                text-shadow: 0.025em 0.05em 0 var(--neon-pink), 0.05em 0 0 var(--neon-blue),
                            0 -0.05em 0 var(--neon-yellow);
            }
            100% {
                text-shadow: -0.025em 0 0 var(--neon-pink), -0.025em -0.025em 0 var(--neon-blue),
                            -0.025em -0.05em 0 var(--neon-yellow);
            }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(45deg, transparent 45%, var(--neon-blue) 45%, var(--neon-blue) 55%, transparent 55%),
                linear-gradient(-45deg, transparent 45%, var(--neon-pink) 45%, var(--neon-pink) 55%, transparent 55%);
            background-size: 300% 300%;
            animation: gradientMove 15s ease infinite;
            opacity: 0.1;
            z-index: 1;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }

        h1 {
            font-size: 5rem;
            color: #fff;
            margin-bottom: 2rem;
            animation: glitch 2s infinite;
            letter-spacing: 0.2em;
            position: relative;
        }

        .countdown {
            font-size: 2rem;
            color: var(--neon-yellow);
            margin: 2rem 0;
            text-shadow: 0 0 10px var(--neon-yellow);
        }

        .cyber-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-blue);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--neon-blue);
            animation: float 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .scanline {
            position: absolute;
            width: 100%;
            height: 100px;
            background: linear-gradient(
                to bottom,
                transparent,
                rgba(0, 255, 255, 0.2),
                transparent
            );
            animation: scanline 4s linear infinite;
        }

        .neon-text {
            color: var(--neon-purple);
            font-size: 1.5rem;
            text-shadow: 0 0 5px var(--neon-purple),
                         0 0 10px var(--neon-purple),
                         0 0 20px var(--neon-purple);
            margin: 1rem 0;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }
            .countdown {
                font-size: 1.5rem;
            }
            .neon-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cyber-box">
            <div class="scanline"></div>
            <h1>BEYONDBRAIN</h1>
            <div class="countdown" id="countdown">INITIALIZING...</div>
            <p class="neon-text">Coming Soon</p>
            <p class="neon-text">From another Universe</p>
        </div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date().getTime();
            const characters = '0123456789ABCDEF';
            let display = '';
            
            for(let i = 0; i < 8; i++) {
                display += characters.charAt(Math.floor(Math.random() * characters.length));
                if(i % 2 === 1 && i < 7) display += ':';
            }
            
            document.getElementById('countdown').textContent = display;
        }

        setInterval(updateCountdown, 100);
    </script>
</body>
</html>
