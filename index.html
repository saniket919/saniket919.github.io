<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durgansh Dixit</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #0c0c0c;
            color: #fff;
            cursor: none;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        h1, h3 {
            margin-bottom: 1rem;
            text-shadow: 0 0 5px #0ff;
        }
        .accent {
            font-weight: bold;
            position: relative;
            text-shadow: 0 0 5px #0ff;
        }
        .accent::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #0ff;
            box-shadow: 0 0 5px #0ff;
            transform: scaleX(0);
            transition: transform 0.3s ease-out;
        }
        .accent:hover::after {
            transform: scaleX(1);
        }
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #0ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #0ff;
        }
        .cursor-follower {
            width: 8px;
            height: 8px;
            background-color: #0ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.2s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #0ff;
        }
        #neural-network {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float {
            animation: float 6s ease-in-out infinite;
        }
        p {
            text-shadow: 0 0 3px #0ff;
        }
        .color-change {
            animation: colorChange 10s infinite;
        }
        @keyframes colorChange {
            0%, 100% { color: #0ff; }
            25% { color: #ff00ff; }
            50% { color: #ffff00; }
            75% { color: #00ff00; }
        }
    </style>
</head>
<body>
    <canvas id="neural-network"></canvas>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="container">
        <h1 class="float">Hi I'm Durgansh Dixit</h1>
       
        <p>I'm passionate about making HUMAN LIKE COMPUTERS or COMPUTER LIKE HUMANS in next 25 years.</p>
        <p>You can connect with me at <a href="mailto:saniket919@gmail.com" class="accent color-change">saniket919@gmail.com</a></p>
        <p>Thank you for visiting my website.</p>
    </div>
    <script>
        // Cursor animation
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        let cursorX = 0, cursorY = 0;
        let followerX = 0, followerY = 0;

        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
        });

        function updateCursor() {
            cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
            
            followerX += (cursorX - followerX) * 0.1;
            followerY += (cursorY - followerY) * 0.1;
            cursorFollower.style.transform = `translate(${followerX}px, ${followerY}px)`;

            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        document.addEventListener('mousedown', () => cursor.style.transform += ' scale(0.8)');
        document.addEventListener('mouseup', () => cursor.style.transform = cursor.style.transform.replace(' scale(0.8)', ''));

        // Neural network and brain cell animation
        const canvas = document.getElementById('neural-network');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const brainCells = [];
        const numParticles = 50;
        const numBrainCells = 5;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }

            draw() {
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class BrainCell {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 20 + 10;
                this.angle = 0;
                this.speed = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.angle += this.speed;
                this.x += Math.cos(this.angle) * 2;
                this.y += Math.sin(this.angle) * 2;

                if (this.x > canvas.width + this.size) this.x = -this.size;
                if (this.x < -this.size) this.x = canvas.width + this.size;
                if (this.y > canvas.height + this.size) this.y = -this.size;
                if (this.y < -this.size) this.y = canvas.height + this.size;
            }

            draw() {
                ctx.strokeStyle = '#ff00ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.stroke();

                for (let i = 0; i < 5; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const length = Math.random() * this.size;
                    const endX = this.x + Math.cos(angle) * length;
                    const endY = this.y + Math.sin(angle) * length;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }
            }
        }

        function init() {
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
            for (let i = 0; i < numBrainCells; i++) {
                brainCells.push(new BrainCell());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            brainCells.forEach(cell => {
                cell.update();
                cell.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 255, 255, ${1 - distance / 100})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
