<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Meet - Durgansh Dixit</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #0c0c0c;
            color: #fff;
            cursor: none;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
            text-align: center;
        }
        h1, h2 {
            margin-bottom: 1rem;
            text-shadow: 0 0 15px #0ff;
        }
        .accent {
            font-weight: bold;
            position: relative;
            text-shadow: 0 0 5px #0ff;
        }
        .accent::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #0ff;
            box-shadow: 0 0 5px #0ff;
            transform: scaleX(0);
            transition: transform 0.3s ease-out;
        }
        .accent:hover::after {
            transform: scaleX(1);
        }
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #0ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #0ff;
        }
        .cursor-follower {
            width: 8px;
            height: 8px;
            background-color: #0ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.1s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #0ff;
        }
        #neural-network, #threejs-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float {
            animation: float 6s ease-in-out infinite;
        }
        p {
            text-shadow: 0 0 3px #0ff;
        }
        .color-change {
            animation: colorChange 60s infinite;
        }
        @keyframes colorChange {
            0%, 100% { color: #0ff; }
            25% { color: #ff00ff; }
            50% { color: #ffff00; }
            75% { color: #00ff00; }
        }
        .meet-button {
            display: inline-block;
            background-color: #0ff;
            color: #0c0c0c;
            padding: 1rem 2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 2rem;
            z-index: 2;
        }
        .meet-button:hover {
            background-color: #000000;
            color: #fff;
            transform: scale(1.25);2
        }
        .quote {
            font-style: italic;
            color: #0ff;
            margin: 2rem 0;
            text-shadow: 0 0 3px #0ff;
        }
        .quote1 {
            font-style: italic;
            color: #0ff;
            margin: 15rem 0;
            text-shadow: 0 0 3px #0ff;
        }
    </style>
</head>
<body>
    <canvas id="neural-network"></canvas>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div id="threejs-scene"></div>
    <div class="container">
        <h1 class="float">Let's Connect! and Forge New Paths Together!</h1>
        <div id="quote" class="quote"></div>
        <h2>Ready to Meet?</h2>
        <a href="https://meet.google.com/yhb-ieji-qsw" class="meet-button accent" target="_blank">Join Google Meet</a>
        <div id="quote1" class="quote1"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Cursor animation
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        let cursorX = 0, cursorY = 0;
        let followerX = 0, followerY = 0;

        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
        });

        function updateCursor() {
            cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
            
            followerX += (cursorX - followerX) * 0.1;
            followerY += (cursorY - followerY) * 0.1;
            cursorFollower.style.transform = `translate(${followerX}px, ${followerY}px)`;

            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        document.addEventListener('mousedown', () => cursor.style.transform += ' scale(0.8)');
        document.addEventListener('mouseup', () => cursor.style.transform = cursor.style.transform.replace(' scale(0.8)', ''));

        // Neural network animation
        const canvas = document.getElementById('neural-network');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const numParticles = 50;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }

            draw() {
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 255, 255, ${1 - distance / 100})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // Three.js animation
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('threejs-scene').appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshStandardMaterial({ color: 0x00ffff });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        const light = new THREE.PointLight(0x00ffff, 1, 100);
        light.position.set(50, 50, 50);
        scene.add(light);

        camera.position.z = 5;

        function animateThreeJS() {
            requestAnimationFrame(animateThreeJS);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animateThreeJS();

        // Update quotes
        const quotes = [
            "Great things in business are never done by one person. They're done by a team of people. - Steve Jobs"
        ];

        const quotes1 = [
            "Coming together is a beginning, staying together is progress, and working together is success. - Henry Ford"
        ];

        function getRandomQuote() {
            return quotes[Math.floor(Math.random() * quotes.length)];
        }

        function getRandomQuote1() {
            return quotes1[Math.floor(Math.random() * quotes.length)];
        }

        document.getElementById('quote').textContent = getRandomQuote();
        document.getElementById('quote1').textContent = getRandomQuote1();

        setInterval(() => {
            document.getElementById('quote').textContent = getRandomQuote();
        }, 10000);
    </script>
</body>
</html>
